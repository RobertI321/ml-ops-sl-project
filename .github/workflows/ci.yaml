name: ci

on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    # Set up python env and run tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
    # Set up python env
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
    # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install river==0.21.1 pyyaml pytest
    # Run tests
      - name: Run tests
        run: |
          pytest tests/
  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.ingest
            image: ml-ops-ingest
          - dockerfile: Dockerfile.train
            image: ml-ops-train
          - dockerfile: Dockerfile.serve
            image: ml-ops-serve
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: actions/checkout@v4

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v3
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest
  deploy:
    needs: build
    runs-on: ubuntu-latest 
    if: vars.DEPLOY_ENABLED == 'true' # Only run deploy if DEPLOY_ENABLED is set to 'true' (i.e if the vm exists and we want to deploy to it)
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_PUBLIC_IP }}
          username: adminuser
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R adminuser:adminuser /home/adminuser/app
            git config --global --add safe.directory /home/adminuser/app
            cd /home/adminuser/app
            git pull
            docker compose up -d --build || true
                      

