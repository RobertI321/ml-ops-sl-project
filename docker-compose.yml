services:
  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER # Listener name for inter-controller communication
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093 # Ports for broker and controller
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092 # External listener for clients
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093 # Quorum voters for the controller in KRaft mode

    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    container_name: ingest
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      API_KEY: ${API_KEY}
      PYTHONUNBUFFERED: 1
    command: [ "python", "ingest.py" ]

  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: train
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio-server:9000
      AWS_ACCESS_KEY_ID: ${ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${ACCESS_PASSWORD}
    command: [ "python", "train.py" ]

  minio-server:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    container_name: minio-server
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${ACCESS_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: minio_init-mc
    depends_on:
      minio-server:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${ACCESS_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set s3 http://minio-server:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb s3/mlflow --ignore-existing &&
        echo 'Bucket mlflow is ready'
      "
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio-server:9000
      MLFLOW_ALLOWED_HOSTS: "*"
      AWS_ACCESS_KEY_ID: ${ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${ACCESS_PASSWORD}
    entrypoint: >
      /bin/sh -c "pip install boto3 pyarrow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root s3://mlflow/ --allowed-hosts 'mlflow:*,localhost:*,127.0.0.1:*,*'"
    depends_on:
      minio-server:
        condition: service_healthy
      mc:
        condition: service_completed_successfully

volumes:
  minio_data:
